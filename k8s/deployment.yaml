apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-system-02-testapi
  namespace: test-system-02
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-system-02-testapi
  template:
    metadata:
      labels:
        app: test-system-02-testapi
    spec:
      containers:
        - name: test-system-02-testapi
          image: ghcr.io/backstage-test-1/test-system-02-testapi:latest
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
